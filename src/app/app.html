<div class="container">
  <app-new-task (taskAdded)="onTaskAdded($event)"></app-new-task>
  <hr class="mx-auto w-50" />
  @for (task of tasks; track task.id) {
    <app-task
      [task]="task"
      (statusChanged)="onStatusChanged($event)"
      (taskDeleted)="deleteTask($event)"
    ></app-task>
}
</div>
